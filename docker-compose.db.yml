services:
  postgres:
    image: postgres:16-alpine
    container_name: teatro-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-teatro}
      POSTGRES_USER: ${DB_USER:-teatro}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teatro123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-teatro} -d ${DB_NAME:-teatro}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
